<script>
const $main = document.getElementById('content');

// ~50-line markdown renderer: #/##/### headings, paragraphs, - lists,
// > quotes, ``` code fences, `code`, **bold**, *italic*, [links](url).
function renderMd(src) {
  const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const inline = s => esc(s)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>')
    .replace(/\*([^*]+)\*/g, '<i>$1</i>')
    .replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2">$1</a>');
  let html = '', para = [], inList = false, code = null;
  const flush = () => {
    if (para.length) { html += '<p>' + para.map(inline).join('<br>') + '</p>'; para = []; }
    if (inList) { html += '</ul>'; inList = false; }
  };
  for (const line of src.split('\n')) {
    if (code !== null) {
      if (line.startsWith('```')) { html += '<pre><code>' + esc(code.join('\n')) + '</code></pre>'; code = null; }
      else code.push(line);
      continue;
    }
    if (line.startsWith('```')) { flush(); code = []; continue; }
    if (/^<!--.*-->\s*$/.test(line)) continue;
    const h = line.match(/^(#{1,3}) +(.*)/);
    if (h) { flush(); const n = h[1].length; html += `<h${n}>${inline(h[2])}</h${n}>`; continue; }
    if (/^[-*] +/.test(line)) {
      if (para.length) flush();
      if (!inList) { html += '<ul>'; inList = true; }
      html += '<li>' + inline(line.replace(/^[-*] +/, '')) + '</li>';
      continue;
    }
    if (line.startsWith('> ')) { flush(); html += '<blockquote>' + inline(line.slice(2)) + '</blockquote>'; continue; }
    if (line.trim() === '') { flush(); continue; }
    // continuation of a list item wrapped to the next line
    if (inList && /^ {2,}/.test(line)) { html = html.replace(/<\/li>$/, ' ' + inline(line.trim()) + '</li>'); continue; }
    para.push(line);
  }
  flush();
  if (code) html += '<pre><code>' + esc(code.join('\n')) + '</code></pre>';
  return html;
}

function showProject(slug) {
  fetch(`${encodeURIComponent(slug)}.md`)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(md => {
      $main.innerHTML = renderMd(md);
    })
    .catch(() => { $main.innerHTML = '<p>404: no such project. <a href="../">← back to home</a></p>'; });
}

const slug = new URLSearchParams(location.search).get('project');
if (slug) showProject(slug);
else $main.innerHTML = '<p><a href="../">← back to home</a></p>';
</script>
